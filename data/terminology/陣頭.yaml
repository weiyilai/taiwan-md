id: zhen-tou
category: culture
fork_type: D

display:
  taiwan: 陣頭
  china: （無直接對應）

english: Zhentou (Taiwanese ceremonial procession performance)

etymology:
  origin: 「陣頭」是台灣民間信仰遶境活動中的表演隊伍，涵蓋八家將、宋江陣、舞龍舞獅、電音三太子等多種形式，是台語詞彙直接命名的民俗文化。
  taiwan_path: 台灣陣頭文化在宗教遶境中不可或缺，各式陣頭代表不同的神明護衛和文化意涵。近年「電音陣頭」融合電子音樂，使傳統文化與現代流行文化結合，引發廣泛討論。
  china_path: 中國閩南、廣東有類似的民俗表演形式，但「陣頭」一詞是台灣特有用語，中國類似活動稱「舞獅」「遊神」等，無統稱「陣頭」。
  fork_point: "~1895前"
  fork_cause: 台語底層詞彙，是台灣民間信仰文化的核心概念，無直接對應的中國大陸用語。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣陣頭文化在當代流行文化中獲得新生命，「電音三太子」成為台灣觀光的文化符號，也出現在國際表演舞台上，是台灣傳統文化現代化轉型的代表案例。

sources:
  - "文化部傳統表演藝術普查資料及陣頭文化研究"

