id: kanban-sign
category: culture
fork_type: A

display:
  taiwan: 看板
  china: 招牌/廣告牌
  hongkong: 招牌

english: signboard / kanban

etymology:
  origin: 日文「看板（かんばん）」，原指商店門前的招牌或廣告板
  taiwan_path: 台灣保留日文「看板」，廣泛用於店面招牌、廣告看板，如「路邊看板」、「選舉看板」
  china_path: 中國用「招牌」（店面）或「廣告牌」（戶外廣告），不用「看板」
  fork_point: "~1945s"
  fork_cause: 日語遺產；日治時代直接引入，戰後持續使用

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: 台灣管理學語境「看板管理（Kanban）」是豐田生產方式，與招牌意義不同但同源

status: stable
notes: 台灣「看板」有兩個截然不同的用法：1）招牌/廣告板（日語遺產），2）看板管理方法論（Kanban，也是日語）。兩者均源自日文但指不同事物。

sources:
  - "教育部國語辭典：看板"
  - "台灣廣告業用語"

added: "2026-03-29"
updated: "2026-03-29"
