id: wu-xian-wang-lu
category: tech
fork_type: B

display:
  taiwan: 無線網路
  china: 无线网络（簡）/ Wi-Fi

english: wireless network / Wi-Fi

etymology:
  origin: 台灣「無線網路」泛指Wi-Fi及無線通訊網路，中國「无线网络」（簡體）同義，兩者均與「Wi-Fi」（英語）並用。
  taiwan_path: 台灣「無線網路」普及率極高，「有沒有WiFi」是台灣人到新地方的第一問，台灣政府推動「iTaiwan」免費無線網路涵蓋公共場所，「無線網路」是台灣數位生活的基礎設施。
  china_path: 中國「无线网络」同樣普及，但政策環境不同（防火牆、VPN需求），使中國無線網路的使用體驗與台灣有所不同。
  fork_point: "~2000s"
  fork_cause: 繁簡字差異，兩岸無線網路普及率均高，但政策環境不同。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣公共場所免費Wi-Fi覆蓋率在亞洲名列前段，「找WiFi」是台灣旅遊文化的重要實踐，也反映了台灣數位基礎建設的成熟度。

sources:
  - "國家通訊傳播委員會（NCC）無線寬頻統計"

