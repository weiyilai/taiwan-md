id: channel-pathway
taiwan: 管道
china: 渠道
type: A
category: business
origin: 台灣說「管道」（溝通管道、銷售管道），中國說「渠道」（溝通渠道、銷售渠道）。
taiwan_path: 台灣「管道」指抽象的途徑或通路，如「透過管道聯繫」「行銷管道」。「渠道」在台灣僅指實體水渠。
china_path: 中國「渠道」廣泛用於抽象義，「銷售渠道」「信息渠道」「溝通渠道」皆為標準用法。
fork_cause: 兩岸對「渠道」一詞的語義擴展程度不同。台灣保留實體義，中國大量用於抽象義。
notes: |
  台灣人聽到「溝通渠道」會覺得是中國用語。但隨著兩岸交流，台灣部分媒體也開始出現「渠道」的抽象用法。
