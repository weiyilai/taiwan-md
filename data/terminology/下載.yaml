  china: 下載

english: download

etymology:
  origin: 從網路或伺服器將檔案傳輸到本地裝置的動作
  taiwan_path: 台灣採「下載」，「下」指從上（伺服器）到下（本地），「載」指承載
  china_path: 中國同樣採「下載」，兩岸一致
  fork_point: "N/A"
  fork_cause: 兩岸一致案例；「下載」的方向性隱喻（從伺服器「下」到本地）非常直觀，全球中文圈均採用

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: 無

status: stable
notes: 「下載」是台灣與中國少數完全一致的網路用語之一。反義詞「上傳」兩岸也一致。

sources:
  - "教育部國語辭典：下載"
  - "兩岸四地網路術語比較研究"

