id: ji-qi-xue-xi
category: tech
fork_type: B

display:
  taiwan: 機器學習
  china: 机器学习（簡）/ 機器學習

english: machine learning

etymology:
  origin: 台灣「機器學習」為machine learning的直譯，中國「机器学习」（簡體）同義，屬繁簡字差異，技術術語本身相同。
  taiwan_path: 台灣「機器學習」在學術界和業界廣泛使用，台大、交大、成大等頂尖大學均有相關課程，台灣AI人才培育將機器學習列為核心技能。
  china_path: 中國「机器学习」同樣是核心AI課程，清華、北大等頂尖大學投入大量資源，並與產業深度結合。
  fork_point: "~2000s"
  fork_cause: 繁簡字差異，技術術語完全相同，兩岸AI學術交流使用相同術語體系。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  「機器學習」是台灣AI教育的核心術語，台灣在此領域有深厚的學術基礎，李宏毅教授的機器學習課程是全球中文AI教育的標誌性資源。

sources:
  - "台灣人工智慧學校及李宏毅教授機器學習課程"

