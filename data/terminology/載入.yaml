id: loading
category: tech
fork_type: B

display:
  taiwan: 載入
  china: 加載

english: load / loading

etymology:
  origin: 將資料或程式從儲存媒體讀取到記憶體中執行的動作
  taiwan_path: 台灣採「載入」，「載」有承載、裝載之意，「載入記憶體」語義清晰
  china_path: 中國採「加載」，有「添加＋載入」的複合語義，來自工業「加載」用語
  fork_point: "~1990s"
  fork_cause: 翻譯時用詞選擇不同；台灣偏向靜態描述（載入），中國偏向動態動作（加載）

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: 遊戲「loading 畫面」兩岸均說「讀取中」或「載入中」

status: stable
notes: 網頁「載入中」（台灣）vs「加載中」（中國）。圖片「載入失敗」（台灣）vs「加載失敗」（中國）。

sources:
  - "教育部資訊術語"
  - "台灣主流前端框架文件（Vue、React 繁中版）"

added: "2026-03-29"
updated: "2026-03-29"
