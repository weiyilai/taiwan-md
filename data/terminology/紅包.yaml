id: hong-bao
category: culture
fork_type: F

display:
  taiwan: 紅包
  china: 红包（簡）/ 紅包

english: red envelope / hongbao

etymology:
  origin: 漢語固有詞，兩岸用詞完全相同（繁簡字差異），但「紅包」在台灣的文化語境與中國「微信紅包」的數位化使用有顯著不同。
  taiwan_path: 台灣「紅包」是婚禮、生日、過年的傳統賀禮，「包多少紅包」是台灣社交場合的重要禮儀計算，「行情」（合適的金額）是台灣特有的社交貨幣概念。
  china_path: 中國「紅包」除傳統實體紅包外，「微信紅包」（2014年推出）掀起數位紅包革命，春節「搶紅包」成為中國重要的數位文化現象，台灣無同等規模的數位紅包文化。
  fork_point: "~1895前"
  fork_cause: 同詞不同數位化程度，中國微信紅包文化是台灣沒有的現象。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣「紅包行情」是重要的社交禮儀課題，「包多少才夠」的社會焦慮是台灣婚禮文化的縮影，也反映了台灣高度重視人際關係維護的社會文化。

sources:
  - "中央研究院民俗學研究及台灣傳統節慶文化調查"

