id: ren-gong-zhi-hui
category: tech
fork_type: B

display:
  taiwan: 人工智慧
  china: 人工智能（簡）/ 人工智慧

english: artificial intelligence / AI

etymology:
  origin: 台灣以「人工智慧」（人造的智慧）描述AI，中國以「人工智能」（人造的智能），「智慧 vs 智能」是兩岸科技術語最典型的差異之一。
  taiwan_path: 台灣「人工智慧」政策以「AI Taiwan」為旗號，台積電、台達電等科技業大量投入AI硬體，「台灣AI」是台灣近年科技競爭力的重要標誌。
  china_path: 中國「人工智能」政策以「新一代人工智能發展規劃（2017）」為核心，百度、阿里、騰訊等企業大量投入AI研發，「AI強國」是中國國家戰略目標。
  fork_point: "~1980s"
  fork_cause: 「智慧 vs 智能」是兩岸科技術語最典型的差異，延伸到「智慧城市 vs 智能城市」「智慧手機 vs 智能手機」等系列詞。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  「人工智慧 vs 人工智能」是兩岸科技詞彙差異最具代表性的案例，也是判斷科技文章語源的快速指標，此差異延伸到所有「智慧/智能」相關詞彙。

sources:
  - "科技部（台灣）AI政策白皮書"

