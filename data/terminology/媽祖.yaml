id: ma-zu
category: culture
fork_type: D

display:
  taiwan: 媽祖
  china: 妈祖（簡）/ 媽祖

english: Mazu (sea goddess / Goddess of the Sea)

etymology:
  origin: 「媽祖」是台灣最重要的民間信仰女神，源自福建莆田的海神信仰，隨移民傳入台灣後高度在地化，成為台灣民間信仰的核心象徵。
  taiwan_path: 台灣媽祖信仰覆蓋全台，「大甲媽祖遶境」是台灣最盛大的宗教活動（UNESCO列為非物質文化遺產），「拜媽祖」「媽祖托夢」是台灣民間生活的重要文化語彙。
  china_path: 中國福建湄洲島是媽祖信仰的發源地，湄洲媽祖廟是信仰中心，兩岸媽祖信仰的淵源關係也成為兩岸交流的文化橋梁。
  fork_point: "~1895前"
  fork_cause: 台語底層詞彙，閩南民間信仰在台灣高度在地化，大甲媽祖遶境是台灣規模最大的民俗活動。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣媽祖信仰是台灣文化認同的重要核心，大甲媽祖遶境九天八夜的壯觀場面是台灣最具代表性的民俗奇觀，也是台灣宗教文化對外展示的重要符號。

sources:
  - "文化部無形文化遺產媽祖信仰保存資料及大甲鎮瀾宮官方資料"

