id: tomato
category: daily
fork_type: B

display:
  taiwan: 番茄
  china: 西紅柿
  hongkong: 番茄

english: tomato

etymology:
  origin: 茄科植物的果實，原產南美洲
  taiwan_path: 台灣說「番茄」，「番」指外來（番邦）的植物，「茄」是茄科植物，台閩語系命名
  china_path: 中國多說「西紅柿」，「西」指西方外來，「紅」指顏色，「柿」指柿子形狀
  fork_point: "~1945s"
  fork_cause: 命名策略不同：台灣強調外來植物種類（番茄），中國強調外觀特徵（西紅柿）

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: 台灣正式植物學也用「番茄」

status: stable
notes: 「番茄炒蛋」是兩岸都有的家常菜，但名稱不同（番茄炒蛋 vs 西紅柿炒雞蛋）。台灣「番」字系列還有番石榴、番薯等。

sources:
  - "教育部國語辭典：番茄"
  - "台灣農委會蔬果命名"

added: "2026-03-29"
updated: "2026-03-29"
