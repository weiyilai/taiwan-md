id: project
taiwan: 專案
china: 項目
type: A
category: business
origin: 中國「項目」涵蓋 project/plan/program 多種語境，台灣依場合區分「專案」「計畫」「企劃」「建案」等。
taiwan_path: 台灣用「專案」（project）、「計畫」（plan/program）、「企劃」（proposal）、「建案」（建築專案），不會用「項目」指 project。台灣的「項目」僅指選項或類目（如「收費項目」）。
china_path: 中國「項目」一詞應用極廣，涵蓋工程項目、研究項目、房地產項目、學生項目作業，是萬用詞。
fork_cause: 台灣保留「項目」的原始窄義（選項/類目），中國將其擴大為 project 的統一翻譯。
notes: |
  紐約時報中文網 2017 年「每日一詞」專欄曾專文討論「項目」一詞的兩岸歧義。台灣讀者看到「項目作業」會困惑，因為台灣說「專題作業」或「專案報告」。
sources:
  - "紐約時報中文網（2017）「項目」「視頻」：台灣人不會講的中國話"
