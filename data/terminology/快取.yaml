id: cache
category: tech
fork_type: B

display:
  taiwan: 快取
  china: 緩存

english: cache

etymology:
  origin: 儲存臨時資料以加速重複存取的機制
  taiwan_path: 台灣採「快取」，「快」強調存取速度快，「取」強調讀取動作；音也近似英文 cache
  china_path: 中國採「緩存」，「緩」有緩衝之意，強調暫存以緩衝速度差異
  fork_point: "~1995s"
  fork_cause: 翻譯角度不同：台灣從「快速讀取」切入，中國從「緩衝儲存」切入

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: 瀏覽器「清除快取」（台灣）vs「清除緩存」（中國）

status: stable
notes: CPU cache 台灣叫「快取記憶體」，中國叫「高速緩存」。這是兩岸 IT 術語中語義角度差異最明顯的案例之一。

sources:
  - "教育部資訊術語"
  - "《計算機組織與結構》（台灣碁峰）"

added: "2026-03-29"
updated: "2026-03-29"
