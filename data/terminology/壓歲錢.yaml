id: ya-sui-qian
category: culture
fork_type: F

display:
  taiwan: 壓歲錢
  china: 压岁钱（簡）/ 壓歲錢

english: New Year money / lucky money for children

etymology:
  origin: 漢語固有詞，兩岸用詞完全相同（繁簡字差異），指長輩在農曆新年給晚輩的紅包。
  taiwan_path: 台灣「壓歲錢」是農曆新年最重要的傳統之一，長輩給晚輩的紅包金額是衡量家族關係親疏的指標，「領壓歲錢」是台灣小孩最期待的過年習俗。
  china_path: 中國「压岁钱」同樣是春節重要習俗，金額因地區、家族條件而異，近年微信紅包也成為數位壓歲錢的載體。
  fork_point: "~1895前"
  fork_cause: 繁簡字差異，習俗文化相近，但台灣無同等規模的數位壓歲錢文化。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣「壓歲錢」的金額討論是農曆春節家庭話題的固定項目，「收到多少壓歲錢」是台灣學生開學後的校園話題，反映了台灣紅包文化的社交意涵。

sources:
  - "教育部《重編國語辭典修訂本》：壓歲錢"

