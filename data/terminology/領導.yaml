id: 'lingdao'
category: culture
subcategory: 文化
fork_type: F

display:
  taiwan: '主管 / 長官 / 領袖 / 領導'
  china: 領導
  hongkong: '領導 / 上司'
  southeast_asia: '領導 / 上司'

english: 'leader / superior / head'

etymology:
  origin: >
    「領導」作為名詞和動詞在兩岸均有，但使用頻率和語感截然不同。
    這是F類（同詞不同語感）的典型案例：同一個詞，在台灣和中國大陸
    承載著不同的語感重量、使用場域，和社會意涵。
  taiwan_path: >
    台灣使用「領導」作為動詞（領導者、領導團隊）完全自然，
    但作為名詞稱呼上司或長官（「你好，領導！」）極不自然，
    台灣人日常不會這樣說話。台灣對上位者的稱呼按場合分化：
    政治語境用「總統」「院長」「部長」等職稱，
    企業語境用「董事長」「總經理」「主管」「老闆」，
    軍警用「長官」，非正式用「大哥」「老大」。
    直接稱「領導」在台灣是會讓人覺得「有點奇怪」的用法，
    通常出現在描述中國政治體制的報導中。
  china_path: >
    「領導」在中國大陸是高頻日常詞，可廣泛指稱任何職場上位者。
    「你好，領導！」「請領導指示」「感謝領導關心」是完全自然的表達。
    黨政體制中「各級領導幹部」「領導班子」是正式用語，
    語感帶有明顯的階層意識和正式性。
    在非正式語境中也可戲謔或諷刺地用「領導」稱呼上司。
  fork_point: '~1949（政治分治後語感分化）'
  fork_cause: >
    中國大陸的黨政體制高度使用「領導」一詞，長期滲透日常語言，
    使「領導」在中國大陸成為對上位者最自然的稱呼。
    台灣則保留了更多職稱分化，「領導」的日常稱呼功能從未如此發展。

usage:
  taiwan_formal: true # 動詞或抽象名詞用法（「社會領導者」）
  taiwan_casual: false # 直接稱呼上司為「領導」不自然
  exceptions: >
    Taiwan.md文章規則：
    - 描述台灣企業/政治 → 不用「領導」稱呼具體人物，用職銜或「領袖」
    - 描述中國黨政體制 → 「領導」是最精確的詞，必須保留
    - 抽象討論（「領導力」「領導風格」）→ 兩岸均自然，可使用

status: 'stable'

notes: >
  「領導」是F類（同詞不同語感）最典型的案例，不是用詞對錯的問題，
  而是同一個詞在不同社會語境中承載的重量不同。
  判斷方式：文章在描述台灣人的日常職場互動時若頻繁出現「領導」，
  很可能是來自中國大陸的用語習慣滲入，或由AI系統生成。

  特別注意：「台灣地區領導人」是中國大陸政策性用語，
  替代「台灣總統」，Taiwan.md文章絕對不使用此表達（見主TERMINOLOGY.md）。

sources:
  - '教育部重編國語辭典 — 領導條目'
  - '台灣語料庫（中研院）領導使用頻率分析'
  - '中國大陸黨政用語詞典'

