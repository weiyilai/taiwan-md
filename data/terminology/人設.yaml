id: 'ren-she'
category: media
subcategory: 媒體
fork_type: E

display:
  taiwan: '形象 / 人物設定 / 人設'
  china: '人設'
  hongkong: '人設 / 角色設定'
  southeast_asia: '人設'

english: 'public image / character setting / persona'

etymology:
  origin: >
    「人設」是「人物設定」的縮略，源自ACG（動漫、遊戲、輕小說）圈的二次元用語，
    指角色的設定（性格、外貌、背景等完整設定）。
    2015年前後，中國網路社群將此詞從ACG圈擴散至娛樂圈，
    用來描述藝人、公眾人物刻意塑造和維持的公眾形象。
    「人設崩塌」（public persona collapse）在2016-2020年間成為
    中國娛樂圈的高頻用語，指藝人真實行為與塑造形象的矛盾曝光。
  taiwan_path: >
    台灣ACG族群（動漫、Cosplay、輕小說圈）2010年代起使用「人設」，
    與中國ACG語境相同。2018-2020年間，隨著台灣年輕人大量接觸
    中國娛樂內容（微博、B站等），「人設」開始出現在台灣娛樂報導中。
    目前台灣使用狀態：年輕族群/社群媒體已普遍使用，
    傳統媒體（中時、聯合、自由）仍偏向使用「形象」「人物設定」。
    台灣的「人設」使用頻率仍低於「形象」，正在滲透期。
  china_path: >
    2015年前後從ACG圈外溢至娛樂圈，2016-2017年爆炸性普及。
    「人設」在中國娛樂報導、社群媒體中已是絕對主流，
    「維持人設」「人設崩塌」「打造人設」為固定搭配。
    已被新華字典（2022年版）收錄為新詞。
  fork_point: '~2015（從ACG向主流滲透）/ ~2020（進入台灣主流語境）'
  fork_cause: >
    中國互聯網文化的外溢效應。台灣年輕世代接收中國娛樂內容，
    自然帶入「人設」用語。但台灣語言使用並不對等，
    正式文章仍偏向本地慣用的「形象」。

usage:
  taiwan_formal: false
  taiwan_casual: true
  exceptions: >
    Taiwan.md文章中：
    - 娛樂/流行文化輕鬆文體 → 可用「人設」（已足夠普及）
    - 正式分析/評論文章 → 建議用「形象」「人物設定」「公眾形象」
    - 描述ACG語境 → 「人設」是最精確的詞，建議保留

status: 'shifting'

notes: >
  「人設」是E類（正在分歧中）的典型案例：
  一個源自中國的用語正在滲透台灣，但滲透程度不均勻——
  年輕世代/社群媒體已普及，正式媒體/書面語仍保守。
  Taiwan.md的立場：描述現象時可用「人設」並附說明，
  分析性文章建議用「形象」以保持書面語一致性。

sources:
