  china_path: 中國同樣採「上傳」，兩岸一致
  fork_point: "N/A"
  fork_cause: 兩岸一致案例；與「下載」對應，「上傳」的方向性隱喻（從本地「上」到伺服器）非常直觀

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: 無

status: stable
notes: 「上傳/下載」是兩岸完全一致的網路術語組合，也是少數無地區分歧的日常數位詞彙。

