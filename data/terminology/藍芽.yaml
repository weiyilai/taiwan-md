id: lan-ya
category: tech
fork_type: B

display:
  taiwan: 藍芽
  china: 蓝牙（簡）/ 藍牙

english: Bluetooth

etymology:
  origin: 「藍芽」（台灣正式譯名）vs「藍牙」（中國譯名），同為Bluetooth的中文譯名，選字不同（芽 vs 牙），台灣「藍芽」已被教育部列為正式譯名。
  taiwan_path: 台灣「藍芽」廣泛用於藍芽耳機、藍芽喇叭等，是台灣科技消費品的日常詞彙，「藍芽連線」「開藍芽」是台灣人的日常操作語言。
  china_path: 中國「藍牙」是標準用語，「藍牙耳机」「藍牙音箱」是常見搭配，「牙 vs 芽」的差異是辨識台灣中國語源的快速方法。
  fork_point: "~2000s"
  fork_cause: 「藍芽 vs 藍牙」是最容易辨識台灣/中國語源的科技詞彙之一。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  「藍芽 vs 藍牙」是最廣為人知的兩岸科技詞彙差異案例，幾乎所有語言學習者都以此為例說明兩岸中文的用字分歧。

sources:
  - "教育部《重編國語辭典修訂本》藍芽譯名"

