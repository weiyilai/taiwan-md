id: betel-nut
category: culture
fork_type: F

display:
  taiwan: 檳榔
  china: 檳榔

english: betel nut

etymology:
  origin: 棕櫚科植物的果實，嚼食後有輕微興奮效果，是台灣特有的嚼食文化
  taiwan_path: 台灣「檳榔」是高度在地化的文化象徵，有「檳榔西施」（販賣檳榔的年輕女性）、檳榔攤等獨特現象
  china_path: 中國湖南地區也有嚼食檳榔文化，但規模和文化意涵與台灣完全不同
  fork_point: "~1945s"
  fork_cause: 台灣原住民族傳統嚼食文化，加上日治後漢人種植擴大，形成台灣特有的檳榔產業

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: 中國近年因口腔癌議題有限制檳榔銷售的趨勢

status: stable
notes: 「檳榔西施」是台灣特有現象（穿著清涼的年輕女性在玻璃屋中販賣檳榔）。台灣為全球檳榔消費量前幾名。嚼檳榔是口腔癌主要風險因素，台灣口腔癌發生率全球偏高。

sources:
  - "教育部國語辭典：檳榔"
  - "衛生福利部口腔癌防治資料"

