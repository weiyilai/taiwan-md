id: trash-bin
category: daily
fork_type: B

display:
  taiwan: 垃圾桶
  china: 垃圾箱/垃圾桶

english: trash can / rubbish bin

etymology:
  origin: 盛裝垃圾的容器，也指電腦系統中暫存已刪除檔案的虛擬容器
  taiwan_path: 台灣日常說「垃圾桶」，電腦操作也說「垃圾桶」（macOS 繁中版採此詞）
  china_path: 中國日常說「垃圾箱」（公共場所）或「垃圾桶」（家用），電腦說「回收站」
  fork_point: "~1995s"
  fork_cause: 電腦 UI 術語分歧：macOS 繁中版採「垃圾桶」，Windows 中文版採「資源回收筒」（台灣）或「回收站」（中國）

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: 台灣電腦 Windows 系統說「資源回收筒」，不說「垃圾桶」；macOS 說「垃圾桶」

status: stable
notes: 台灣電腦操作趣事：macOS 說「垃圾桶」，Windows 說「資源回收筒」，中國 Windows 說「回收站」。台灣街道垃圾桶（「垃圾車來了！」搭配音樂收垃圾）是著名文化現象。

sources:
  - "macOS 繁體中文版 UI 用語"
  - "Microsoft Windows 繁體中文版 UI 用語"

added: "2026-03-29"
updated: "2026-03-29"
