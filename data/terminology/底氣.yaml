id: confidence
category: daily
fork_type: E
display:
  taiwan: 信心 / 把握 / 底氣
  china: 底氣
etymology:
  origin: 中國「底氣」指信心或底牌，台灣傳統不常用但近年有滲入。
  taiwan_path: 台灣說「信心」「把握」「本錢」「膽量」，「底氣」在台灣較少見。
  china_path: 中國「底氣足」「沒底氣」是日常口語，也常出現在政治語境。
  fork_cause: 中國口語高頻詞，源自北方方言，台灣未廣泛採用。
notes: 「底氣」在台灣有滲入趨勢，尤其在商業和媒體語境。但多數台灣人聽到會覺得是中國用法。
