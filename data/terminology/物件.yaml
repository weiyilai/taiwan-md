id: object
category: tech
fork_type: B

display:
  taiwan: 物件
  china: 對象

english: object (OOP)

etymology:
  origin: 物件導向程式設計（OOP）中封裝資料與行為的基本單位
  taiwan_path: 台灣採「物件」，從日文「オブジェクト」的漢字轉譯，強調「具體可操作的事物」
  china_path: 中國採「對象」，源自哲學「認識對象」的概念，泛化為程式設計的基本單位
  fork_point: "~1990s"
  fork_cause: 台灣受日本電腦書籍影響（「オブジェクト指向」→「物件導向」），中國採哲學語境譯法

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: "「對象」在台灣只表示「伴侶」或「目標人物」，讀到中文 OOP 文章時造成極大混淆"

status: stable
notes: 這是兩岸 IT 術語最容易造成誤解的詞之一。台灣人看到「對象導向程式設計」會愣一下，因為「對象」在台灣通常指交往的伴侶。

sources:
  - "《物件導向程式設計》（台灣碁峰）"
  - "日文影響：オブジェクト指向 → 物件導向"

added: "2026-03-29"
updated: "2026-03-29"
