id: tu-di-gong
category: culture
fork_type: D

display:
  taiwan: 土地公
  china: 土地爺 / 土地公

english: Tu Di Gong (Earth God)

etymology:
  origin: 「土地公」是台灣最普遍的地方守護神，台語稱「土地公」，中國大陸閩南語地區也使用，但「土地爺」在北方更常見。
  taiwan_path: 台灣幾乎每個社區都有土地公廟（福德祠），「拜土地公」「土地公生日」是台灣民間生活的日常宗教活動，土地公也守護田地和財富，是台灣農業文化和商業文化的守護神。
  china_path: 中國大陸同樣有土地公（土地神）信仰，南方閩粵地區稱「土地公」，北方稱「土地爺」，各地形象和祭祀習俗略有不同。
  fork_point: "~1895前"
  fork_cause: 台語底層詞彙，土地公信仰在台灣的普及程度極高，是台灣密度最高的宗教場所。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣土地公廟的密度是全台廟宇中最高的，「每個社區都有土地公廟」是台灣基層社區信仰文化的寫照，也是台灣人與土地關係的宗教象徵。

sources:
  - "文化部民間信仰土地公信仰普查資料"

