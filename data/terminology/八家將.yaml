id: ba-jia-jiang
category: culture
fork_type: D

display:
  taiwan: 八家將
  china: （無直接對應）

english: Eight Generals / Ba Jia Jiang

etymology:
  origin: 「八家將」是台灣閩南民間信仰中的神將文化，由八位神明組成的護衛陣容，為城隍爺的護法，名稱與儀式源自閩南文化並在台灣發展出獨特形態。
  taiwan_path: 台灣「八家將」以高度儀式化的臉譜彩繪、服飾和舞步為特色，是台灣民間信仰遶境活動的重要組成，也是台灣最具視覺衝擊力的文化表演之一。
  china_path: 中國閩南、廣東地區有類似的神將文化，但台灣的八家將已發展出獨特的在地形態，與中國原型有顯著差異。
  fork_point: "~1895前"
  fork_cause: 台語底層詞彙，閩南民間信仰在台灣的在地化發展，台灣版本已形成獨立的文化體系。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: ""

status: stable
notes: |
  台灣八家將文化在民俗學和文化研究中具有重要地位，其高度視覺化的表演形式也成為台灣當代藝術和流行文化的重要素材，是台灣本土文化認同的重要符號。

sources:
  - "文化部無形文化遺產八家將保存資料"

